<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giriş Yap - Cano AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #f8fafc;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card auth-card shadow-2xl p-4">
                    <h3 class="text-center fw-bold mb-4 text-primary" style="color: #38bdf8 !important;">Tekrar Hoş Geldin</h3>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} py-2 fs-6 text-center rounded-3">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">KULLANICI ADI</label>
                            <input type="text" name="username" class="form-control p-2.5" placeholder="cano123" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-bold">ŞİFRE</label>
                            <input type="password" name="password" class="form-control p-2.5" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 p-2.5 fw-bold rounded-3 shadow mb-3" style="background: #4f46e5; border: none;">Giriş Yap</button>
                    </form>
                    <p class="text-center text-muted small mb-0">Hesabın yok mu? <a href="/register" class="text-decoration-none" style="color: #38bdf8;">Kayıt Ol</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
