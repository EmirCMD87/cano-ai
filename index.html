<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cano AI Ders Platformu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #f8fafc;
        }
        .hero-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 text-center p-5 hero-card shadow-lg animate__animated animate__fadeIn">
                <div class="display-4 fw-bold mb-3 text-transparent bg-clip-text bg-gradient" style="background: linear-gradient(45deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    🤖 Cano AI Ders Platformu
                </div>
                <p class="lead text-muted mb-4 fs-5">5. sınıftan 12. sınıfa kadar tüm ders notlarını yükle, yapay zeka saniyeler içinde senin için fotoğrafları okusun ve sınav özetini çıkarsın!</p>
                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <a href="/login" class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow" style="background: #4f46e5; border: none;">Giriş Yap</a>
                    <a href="/register" class="btn btn-outline-light btn-lg px-5 rounded-pill fw-bold">Kayıt Ol</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
